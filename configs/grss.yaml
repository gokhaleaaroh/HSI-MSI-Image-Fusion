experiment:
  name: 'grss_ca_siamese'
device: 0
num_epochs: 1
model:
 name: gr_siamese
 kwargs:
  hsi_in: 12
  msi_in: 3
  latent_dim: 256
  output_channels: 21
dataset:
  name: grss
  kwargs:
    data_dir: './data/GRSS/ImageryAndTrainingGT/2018IEEE_Contest/Phase2/Aligned/'
    rgb_width: 160
    rgb_height: 160
    hsi_width: 8 
    hsi_height: 8 
    top_k: 12
    channels:
    gamma: 0.4
    contrast_enhance: True
    conductivity: 0.634
    window_size: 3
    split_ratio: 0.8
    data_type: patch       # spatial patches, not pixels
  batch_size: 128           # patches are larger, fewer per batch
loss:
  name: focal
  kwargs:
    gamma: 3.0
